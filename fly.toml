# fly.toml app configuration file generated for CivicSetu

app = "civicsetu-production-app" # Change this to your unique app name

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
